<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="bootstrap/bootstrap.css">
  <link rel="stylesheet" href="/css/register.css" />
  <link rel="stylesheet" href="fontawesome/css/all.css">

  <title>Register Your Account</title>
  <!-- SEO Meta Tags -->
  <meta name="description"
    content="Create an account on the SIWES Attendance Management System to start tracking and managing attendance efficiently.">

  <meta name="keywords" content="Register, SIWES Attendance, Student Registration, Attendance System">

  <meta name="author" content="SIWES Student Development Team">

  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:title" content="Register | SIWES Attendance System">
  <meta property="og:description" content="Sign up to start using the SIWES Attendance Management System.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="http://localhost:5500/register.html">
  <meta property="og:image" content="/images/preview.png">
</head>

<body>
  <div class="main d-flex justify-content-center align-items-center min-vh-100 bg-white">

    <div class="inner-div w-100 p-3 p-sm-4 p-md-5 mx-2">

      <div class="header d-flex align-items-center justify-content-between gap-2 mb-4">
        <a href="login.html" class="back-btn">
          <i class="fas fa-arrow-left"></i>
        </a>

        <h2 class="header-h1 m-0 text-center flex-grow-1">
          Register Your Account
        </h2>

        <img src="/images/logo-dark.png" alt="" class="img-fluid" style="max-width: 90px;">
      </div>

      <form class="registration-form d-flex flex-column">

        <div class="info mb-3 form-floating">
          <input type="text" class="form-control" id="fullname" placeholder="Full Name" required>
          <label for="fullname">Full Name</label>
        </div>

        <div class="info mb-3 form-floating">
          <input type="text" class="form-control" id="matric" placeholder="Matric Number" required>
          <label for="matric">Matric Number</label>
        </div>

        <div class="info mb-3 form-floating">
          <select class="form-select" id="dept" required>
            <option value=""></option>
            <option>Software Engineering</option>
            <option>Computer Science</option>
            <option>ICT</option>
            <option>Cyber Security</option>
          </select>
          <label for="dept">Department</label>
  <div class="container">
    <div class="row">
      <div class="col-sm-12 col-md-8 offset-md-2 col-lg-6 offset-lg-3 p-md-5">
        <div class="header bg-purple p-3 mb-5">
          <a href="/" class="back-btn">
            <i class="fas fa-arrow-left"></i>
          </a>
          <h2 class="header-h1 m-0">Register Your Account</h2>
          <img width="300px" src="/images/logo-dark.png" alt="" />
        </div>
        <form class="">
          <div class="form-floating mb-3">
            <input type="text" class="form-control" name="full_name" id="full_name" placeholder="" />
            <label for="formId1">Full name</label>
          </div>
          <div class="row">
            <div class="col-sm-12 col-md-6">
              <div class="form-floating mb-3">
                <input type="text" class="form-control" name="mat_number" id="mat_number" placeholder="" />
                <label for="formId1">Matriculation Number</label>
              </div>
            </div>
            <div class="col-sm-12 col-md-6">
              <div class="form-floating">
                <select class="form-select" id="dept" name="dept" required>
                  <option value="">Select a department</option>
                  <option value="Software Engineering">Software Engineering</option>
                  <option value="Computer Science">Computer Science</option>
                  <option value="ICT">ICT</option>
                  <option value="Cyber Security">Cyber Security</option>
                </select>
                <label for="dept">Dept</label>
              </div>
            </div>
          </div>

        <div class="info mb-3 form-floating">
          <select class="form-select" id="faculty" required>
            <option value=""></option>
            <option>Faculty of Computing</option>
            <option>Faculty of Engineering</option>
          </select>
          <label for="faculty">Faculty</label>
        </div>

        <div class="info mb-3 form-floating">
          <select class="form-select" id="place-of-it" required>
            <option value=""></option>
            <option>Alihame</option>
            <option>Town</option>
          </select>
          <label for="place-of-it">Place of IT</label>
        </div>

        <div class="info mb-3 form-floating">
          <input type="date" class="form-control" id="registration-date" placeholder="Date" required>
          <label for="registration-date">Registration Date</label>
        </div>

        <div class="info mb-4 form-floating">
          <input type="password" class="form-control" id="password" placeholder="Password" required>
          <label for="password">Password</label>
        </div>

        <button type="submit" class="submit-btn btn w-100 py-2">
          <a href="index.html">Register
          </a>
        </button>

      </form>
          <div class="info mb-4">
            <label for="faculty">Faculty</label>
            <select class="form-control p-3" id="faculty" required>
              <option value="Faculty of Computing">Faculty of Computing</option>
            </select>
          </div>

          <div class="info mb-4">
            <label for="place-of-it">Place of IT (Alihame/Town)</label>
            <select class="form-control p-3" id="place-of-it" required>
              <option value="">Select a place</option>
              <option value="Alihame">Alihame</option>
              <option value="Town">Town</option>
            </select>
          </div>

          <div class="info mb-4">
            <label for="registration-date">Registration Date</label>
            <input class="form-control p-3" type="date" id="registration-date" required />
          </div>

          <div class="info mb-4">
            <label for="password">Password</label>
            <input class="form-control p-3" type="password" id="password" placeholder="Enter your password" required />
          </div>

          <button type="submit" class="btn btn-success">Register</button>
        </form>
      </div>
    </div>
  </div>
</body>

</html>
