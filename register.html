<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="bootstrap/bootstrap.css">
  <link rel="stylesheet" href="/css/register.css" />

  <title>Register Your Account</title>
  <!-- SEO Meta Tags -->
  <meta name="description"
    content="Create an account on the SIWES Attendance Management System to start tracking and managing attendance efficiently.">

  <meta name="keywords" content="Register, SIWES Attendance, Student Registration, Attendance System">

  <meta name="author" content="SIWES Student Development Team">

  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:title" content="Register | SIWES Attendance System">
  <meta property="og:description" content="Sign up to start using the SIWES Attendance Management System.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="http://localhost:5500/register.html">
  <meta property="og:image" content="/images/preview.png">
</head>

<body>
  <div class="container">
    <div class="row">
      <div class="col-sm-12 col-md-8 offset-md-2 col-lg-6 offset-lg-3 p-md-5">
        <div class="header bg-purple p-3 mb-5">
          <a href="/" class="back-btn">
            <i class="fas fa-arrow-left"></i>
          </a>
          <h2 class="header-h1 m-0">Register Your Account</h2>
          <img width="300px" src="/images/logo-dark.png" alt="" />
        </div>
        <form class="">
          <div class="form-floating mb-3">
            <input type="text" class="form-control" name="full_name" id="full_name" placeholder="" />
            <label for="formId1">Full name</label>
          </div>
          <div class="row">
            <div class="col-sm-12 col-md-6">
              <div class="form-floating mb-3">
                <input type="text" class="form-control" name="mat_number" id="mat_number" placeholder="" />
                <label for="formId1">Matriculation Number</label>
              </div>
            </div>
            <div class="col-sm-12 col-md-6">
              <div class="form-floating">
                <select class="form-select" id="dept" name="dept" required>
                  <option value="">Select a department</option>
                  <option value="Software Engineering">Software Engineering</option>
                  <option value="Computer Science">Computer Science</option>
                  <option value="ICT">ICT</option>
                  <option value="Cyber Security">Cyber Security</option>
                </select>
                <label for="dept">Dept</label>
              </div>
            </div>
          </div>

          <div class="info mb-4">
            <label for="faculty">Faculty</label>
            <select class="form-control p-3" id="faculty" required>
              <option value="Faculty of Computing">Faculty of Computing</option>
            </select>
          </div>

          <div class="info mb-4">
            <label for="place-of-it">Place of IT (Alihame/Town)</label>
            <select class="form-control p-3" id="place-of-it" required>
              <option value="">Select a place</option>
              <option value="Alihame">Alihame</option>
              <option value="Town">Town</option>
            </select>
          </div>

          <div class="info mb-4">
            <label for="registration-date">Registration Date</label>
            <input class="form-control p-3" type="date" id="registration-date" required />
          </div>

          <div class="info mb-4">
            <label for="password">Password</label>
            <input class="form-control p-3" type="password" id="password" placeholder="Enter your password" required />
          </div>

          <button type="submit" class="btn btn-success">Register</button>
        </form>
      </div>
    </div>
  </div>
</body>

</html>
